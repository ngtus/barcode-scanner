<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Html5Qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6">
        <div class="card shadow">
          <div class="card-body text-center">

            <h5 class="card-title mb-3">Barcode Scanner</h5>

            <!-- Loader -->
            <div id="product-loader" class="text-center my-3">
              <div class="spinner-border text-primary" role="status"></div>
              <div>Loading products...</div>
            </div>

            <!-- Scanner -->
            <div id="reader" class="w-100" style="display:none"></div>

            <!-- Scanned result -->
            <div class="mt-3">
              <h6>Scanned Code:</h6>
              <div id="scan-result" class="alert alert-success fw-bold">
                Waiting for scan...
              </div>
            </div>

            <!-- Add new item -->
            <div id="add-product" style="display:none" class="mt-3">
              <h6>New Product</h6>
              <input id="new-name" class="form-control mb-2" placeholder="Item Name">
              <input id="new-price" class="form-control mb-2" placeholder="Price">

              <div id="loading" class="text-center mt-2" style="display:none">
                <div class="spinner-border text-primary" role="status"></div>
                <div>Saving product...</div>
              </div>

              <button class="btn btn-success" onclick="addProduct()">
                Add Product
              </button>
            </div>

            <!-- Cart -->
            <h5 class="mt-4">Cart</h5>

            <table class="table table-sm">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Price</th>
                  <th>Qty</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="cart-body"></tbody>
            </table>

            <div class="text-end fw-bold fs-5">
              Total: $<span id="cart-total">0</span>
            </div>

            <button class="btn btn-danger mt-2" onclick="clearCart()">
              Clear Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="scanner.js"></script>
</body>

</html>
